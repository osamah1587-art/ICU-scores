{id:'ranson',name:'Ranson Criteria',desc:'Acute pancreatitis severity at admission and 48h',cat:'GI',catColor:'#F5A623',catBg:'#F5A62322',
ref:'Ranson JH et al. Surg Gynecol Obstet 1974;139:69–81.',
fields:[
  {type:'chk',id:'ra_age',label:'Age > 55 years (at admission)',sub:'',pts:1},
  {type:'chk',id:'ra_wbc',label:'WBC > 16,000/µL (at admission)',sub:'',pts:1},
  {type:'chk',id:'ra_glu',label:'Glucose > 200 mg/dL (at admission)',sub:'',pts:1},
  {type:'chk',id:'ra_ldh',label:'LDH > 350 IU/L (at admission)',sub:'',pts:1},
  {type:'chk',id:'ra_ast',label:'AST > 250 IU/L (at admission)',sub:'',pts:1},
  {type:'chk',id:'ra_hct',label:'Hematocrit drop > 10% (at 48h)',sub:'',pts:1},
  {type:'chk',id:'ra_bun',label:'BUN rise > 5 mg/dL (at 48h)',sub:'',pts:1},
  {type:'chk',id:'ra_ca',label:'Calcium < 8 mg/dL (at 48h)',sub:'',pts:1},
  {type:'chk',id:'ra_pao2',label:'PaO₂ < 60 mmHg (at 48h)',sub:'',pts:1},
  {type:'chk',id:'ra_def',label:'Base deficit > 4 mEq/L (at 48h)',sub:'',pts:1},
  {type:'chk',id:'ra_fluid',label:'Fluid sequestration > 6 L (at 48h)',sub:'',pts:1},
],
calc(v){
  let s=0;
  ['ra_age','ra_wbc','ra_glu','ra_ldh','ra_ast','ra_hct','ra_bun','ra_ca','ra_pao2','ra_def','ra_fluid'].forEach(k=>{if(v[k])s++;});
  return{score:s,max:11};
},
interpret(r){
  const s=r.score;
  if(s<=2)return{risk:'Mild',mort:'<5%',color:'#4ADE80',bg:'#4ADE8022',rec:'Mild pancreatitis. Ward management. IV fluids (Ringer\'s lactate), analgesia, NPO then early oral/enteral feeding. Monitor for deterioration.'};
  if(s<=4)return{risk:'Moderate Severity',mort:'~15–20%',color:'#F5A623',bg:'#F5A62322',rec:'Moderate severity. HDU or close monitoring. Aggressive IV resuscitation. CT abdomen at 48–72h if not improving. GI and surgical input.'};
  if(s<=6)return{risk:'Severe',mort:'~40%',color:'#FF5A5A',bg:'#FF5A5A22',rec:'Severe pancreatitis. ICU admission. High risk of organ failure and necrosis. NJ feeding. Monitor for infection (if fever + rising CRP, CT-guided aspiration). Multidisciplinary team.'};
  return{risk:'Critical',mort:'>40%',color:'#FF5A5A',bg:'#FF5A5A22',rec:'Critical severity. Very high mortality. Full ICU support. Likely infected necrosis — antibiotics (imipenem or meropenem). Endoscopic or surgical necrosectomy may be required. Palliative goals-of-care discussion.'};
}},

// ── RIFLE ─────────────────────────────────────────
{id:'rifle',name:'RIFLE Criteria',desc:'AKI staging: Risk, Injury, Failure, Loss, ESRD',cat:'Renal',catColor:'#4A9EFF',catBg:'#4A9EFF22',
ref:'Bellomo R et al. Crit Care 2004;8:R204–R212.',
fields:[
  {type:'sel',id:'rf_cr',label:'Serum Creatinine change',opts:['No change / <1.5× baseline','1.5× baseline increase — Risk','2× baseline increase — Injury','3× baseline OR Cr ≥4 mg/dL with acute rise — Failure']},
  {type:'sel',id:'rf_uo',label:'Urine output',opts:['≥0.5 mL/kg/h — Normal','<0.5 mL/kg/h for >6h — Risk','<0.5 mL/kg/h for >12h — Injury','<0.3 mL/kg/h for 24h OR anuria ≥12h — Failure']},
  {type:'chk',id:'rf_loss',label:'Loss: Complete loss of renal function >4 weeks',sub:'',pts:0},
  {type:'chk',id:'rf_esrd',label:'ESRD: End-Stage Renal Disease (>3 months)',sub:'',pts:0},
],
calc(v){
  let stage='None';
  if(v.rf_esrd)stage='ESRD';
  else if(v.rf_loss)stage='Loss';
  else{
    const crStage=v.rf_cr?.includes('Failure')?3:v.rf_cr?.includes('Injury')?2:v.rf_cr?.includes('Risk')?1:0;
    const uoStage=v.rf_uo?.includes('Failure')?3:v.rf_uo?.includes('Injury')?2:v.rf_uo?.includes('Risk')?1:0;
    const n=Math.max(crStage,uoStage);
    stage=n===3?'Failure':n===2?'Injury':n===1?'Risk':'None';
  }
  const map={'None':0,'Risk':1,'Injury':2,'Failure':3,'Loss':4,'ESRD':5};
  return{score:map[stage]||0,max:5,stageName:stage};
},
interpret(r){
  const stage=r.stageName||'None';
  if(stage==='None')return{risk:'No AKI',mort:'',color:'#4ADE80',bg:'#4ADE8022',rec:'No AKI by RIFLE criteria. Continue nephroprotective care.'};
  if(stage==='Risk')return{risk:'RIFLE — Risk',mort:'↑ Hospital mortality',color:'#F5A623',bg:'#F5A62322',rec:'RIFLE Risk: ≈5–10% in-hospital mortality above baseline. Optimize fluids. Avoid nephrotoxins. Hourly UO monitoring. Identify and treat precipitant.'};
  if(stage==='Injury')return{risk:'RIFLE — Injury',mort:'↑↑ Hospital mortality',color:'#F5A623',bg:'#F5A62322',rec:'RIFLE Injury. Nephrology consult. Strict fluid balance. Evaluate for obstruction. Monitor K⁺, creatinine trend. Begin RRT planning if not improving.'};
  if(stage==='Failure')return{risk:'RIFLE — Failure',mort:'↑↑↑ Hospital mortality (~50%)',color:'#FF5A5A',bg:'#FF5A5A22',rec:'RIFLE Failure. Urgent nephrology. RRT likely needed. Indications: volume overload, K⁺>6.5, pH<7.1, uremic encephalopathy. CRRT in hemodynamic instability; IHD if stable.'};
  if(stage==='Loss')return{risk:'RIFLE — Loss',mort:'RRT-dependent >4 weeks',color:'#FF5A5A',bg:'#FF5A5A22',rec:'Complete loss of kidney function >4 weeks. Long-term RRT planning. Renal replacement counseling. Transplant evaluation if recovery unlikely.'};
  return{risk:'RIFLE — ESRD',mort:'RRT-dependent >3 months',color:'#FF5A5A',bg:'#FF5A5A22',rec:'End-stage renal disease. Permanent RRT or transplant. Nephrology for long-term management.'};
}},

// ── SAPS II ──────────────────────────────────────
{id:'saps2',name:'SAPS II',desc:'Simplified Acute Physiology Score — ICU mortality',cat:'Severity',catColor:'#FF5A5A',catBg:'#FF5A5A22',
ref:'Le Gall JR et al. JAMA 1993;270:2957–2963.',
fields:[
  {type:'num',id:'sa_age',label:'Age (years)',min:0,max:120},
  {type:'num',id:'sa_hr',label:'Heart Rate (worst in 24h)',min:0,max:300},
  {type:'num',id:'sa_sbp',label:'Systolic BP (worst in 24h)',min:0,max:250},
  {type:'num',id:'sa_temp',label:'Temperature (°C, worst)',min:30,max:45},
  {type:'num',id:'sa_pf',label:'PaO₂/FiO₂ ratio (if ventilated)',min:0,max:700},
  {type:'num',id:'sa_uo',label:'Urine output (L/24h)',min:0,max:15},
  {type:'num',id:'sa_bun',label:'BUN (mg/dL)',min:0,max:200},
  {type:'sel',id:'sa_gcs2',label:'GCS',opts:['14–15 (0pts)','11–13 (5pts)','9–10 (7pts)','6–8 (13pts)','<6 (26pts)']},
  {type:'num',id:'sa_k',label:'Potassium (mEq/L)',min:1,max:10},
  {type:'num',id:'sa_na',label:'Sodium (mEq/L)',min:100,max:200},
  {type:'num',id:'sa_hco3',label:'HCO₃ (mEq/L)',min:1,max:50},
  {type:'num',id:'sa_bili',label:'Bilirubin (mg/dL)',min:0,max:50},
  {type:'num',id:'sa_wbc2',label:'WBC (×10³/µL)',min:0,max:100},
  {type:'sel',id:'sa_adm',label:'Admission type',opts:['Scheduled surgical (0pts)','Medical (6pts)','Unscheduled surgical (8pts)']},
  {type:'sel',id:'sa_chron',label:'Chronic disease',opts:['None (0pts)','Metastatic cancer (9pts)','Hematological malignancy (10pts)','AIDS (17pts)']},
],
calc(v){
  let s=0;
  const age=+v.sa_age||0;
  if(age<40)s+=0;else if(age<60)s+=7;else if(age<70)s+=12;else if(age<75)s+=15;else if(age<80)s+=16;else s+=18;
  const hr=+v.sa_hr||0;
  if(hr<40||hr>=160)s+=11;else if(hr<70)s+=2;else if(hr>=120)s+=4;
  const sbp=+v.sa_sbp||0;
  if(sbp<70)s+=13;else if(sbp<100)s+=5;else if(sbp>=200)s+=2;
  const temp=+v.sa_temp||0;if(temp>=39)s+=3;
  const pf=+v.sa_pf||0;
  if(v.sa_pf){if(pf<100)s+=11;else if(pf<200)s+=9;else if(pf<67||pf<100)s+=6;}
  const uo=+v.sa_uo||0;
  if(uo<0.5)s+=11;else if(uo<1)s+=4;
  const bun=+v.sa_bun||0;
  if(bun>=84)s+=10;else if(bun>=28)s+=6;
  if(v.sa_gcs2?.includes('5pts'))s+=5;else if(v.sa_gcs2?.includes('7pts'))s+=7;else if(v.sa_gcs2?.includes('13pts'))s+=13;else if(v.sa_gcs2?.includes('26pts'))s+=26;
  const k=+v.sa_k||0;if(k<3||k>=5)s+=3;
  const na=+v.sa_na||0;if(na<125)s+=5;else if(na>=145)s+=1;
  const hco=+v.sa_hco3||0;if(hco<15)s+=6;else if(hco<20)s+=3;
  const bili=+v.sa_bili||0;if(bili>=6)s+=9;else if(bili>=4)s+=4;
  const wbc=+v.sa_wbc2||0;if(wbc<1)s+=12;else if(wbc>=20)s+=3;
  if(v.sa_adm?.includes('6pts'))s+=6;else if(v.sa_adm?.includes('8pts'))s+=8;
  if(v.sa_chron?.includes('9pts'))s+=9;else if(v.sa_chron?.includes('10pts'))s+=10;else if(v.sa_chron?.includes('17pts'))s+=17;
  const logit=-7.7631+0.0737*s+0.9971*Math.log(s+1);
  const mort=Math.round(Math.exp(logit)/(1+Math.exp(logit))*100);
  return{score:s,max:163,extra:{mort}};
},
interpret(r){
  const s=r.score,m=r.extra?.mort??0;
  if(s<30)return{risk:'Low',mort:`~${m}%`,color:'#4ADE80',bg:'#4ADE8022',rec:`Predicted hospital mortality ~${m}%. Standard ICU monitoring and supportive care.`};
  if(s<50)return{risk:'Moderate',mort:`~${m}%`,color:'#F5A623',bg:'#F5A62322',rec:`Predicted hospital mortality ~${m}%. Active organ support. Early goals-of-care discussion.`};
  if(s<70)return{risk:'High',mort:`~${m}%`,color:'#FF5A5A',bg:'#FF5A5A22',rec:`Predicted hospital mortality ~${m}%. Full organ support. Palliative care input. Family meeting.`};
  return{risk:'Critical',mort:`~${m}%`,color:'#FF5A5A',bg:'#FF5A5A22',rec:`Predicted hospital mortality ~${m}%. Very high severity. Comprehensive goals-of-care discussion essential.`};
}},

// ── SOFA ─────────────────────────────────────────
{id:'sofa',name:'SOFA',desc:'Sequential Organ Failure Assessment',cat:'Severity',catColor:'#FF5A5A',catBg:'#FF5A5A22',
ref:'Vincent JL et al. Intensive Care Med 1996;22:707–710.',
fields:[
  {type:'sel',id:'sf_resp',label:'Respiration: PaO₂/FiO₂ (mmHg)',opts:['≥400 (0pts)','300–399 (1pt)','200–299 (2pts)','100–199 with respiratory support (3pts)','<100 with respiratory support (4pts)']},
  {type:'sel',id:'sf_plt',label:'Coagulation: Platelets (×10³/µL)',opts:['≥150 (0pts)','100–149 (1pt)','50–99 (2pts)','20–49 (3pts)','<20 (4pts)']},
  {type:'sel',id:'sf_liver',label:'Liver: Bilirubin (mg/dL)',opts:['<1.2 (0pts)','1.2–1.9 (1pt)','2.0–5.9 (2pts)','6.0–11.9 (3pts)','≥12 (4pts)']},
  {type:'sel',id:'sf_cv',label:'Cardiovascular',opts:['MAP ≥70 mmHg (0pts)','MAP <70 mmHg (1pt)','Dopamine ≤5 or Dobutamine any (2pts)','Dopamine >5 or Epi ≤0.1 or Norepi ≤0.1 (3pts)','Dopamine >15 or Epi >0.1 or Norepi >0.1 (4pts)']},
  {type:'sel',id:'sf_cns',label:'CNS: GCS',opts:['15 (0pts)','13–14 (1pt)','10–12 (2pts)','6–9 (3pts)','<6 (4pts)']},
  {type:'sel',id:'sf_renal',label:'Renal: Creatinine (mg/dL) or UO',opts:['<1.2 (0pts)','1.2–1.9 (1pt)','2.0–3.4 (2pts)','3.5–4.9 or UO <500mL/d (3pts)','≥5.0 or UO <200mL/d (4pts)']},
],
calc(v){
  let s=0;
  ['sf_resp','sf_plt','sf_liver','sf_cv','sf_cns','sf_renal'].forEach(k=>{
    const val=v[k]||'';
    if(val.includes('4pts'))s+=4;else if(val.includes('3pts'))s+=3;else if(val.includes('2pts'))s+=2;else if(val.includes('1pt'))s+=1;
  });
  return{score:s,max:24};
},
interpret(r){
  const s=r.score;
  if(s<=6)return{risk:'Low Mortality',mort:'<10%',color:'#4ADE80',bg:'#4ADE8022',rec:'SOFA ≤6: low mortality risk. Organ support as needed. Treat underlying cause. Reassess daily — SOFA trend more important than single value.'};
  if(s<=9)return{risk:'Moderate',mort:'~15–20%',color:'#F5A623',bg:'#F5A62322',rec:'SOFA 7–9: moderate organ failure. Optimize each failing system. qSOFA ≥2 suggests sepsis — culture-guided antibiotics, fluid resuscitation, vasopressors if MAP <65.'};
  if(s<=12)return{risk:'High',mort:'~40–50%',color:'#FF5A5A',bg:'#FF5A5A22',rec:'SOFA 10–12: significant multi-organ failure. Aggressive ICU management. Renal replacement if AKI Stage 3. Goals-of-care discussion.'};
  return{risk:'Critical',mort:'>50%',color:'#FF5A5A',bg:'#FF5A5A22',rec:'SOFA >12: severe multi-organ failure. Very high mortality. Full organ support unless futile. Urgent family meeting and palliative care involvement.'};
}},

// ── STOP-BANG ────────────────────────────────────
{id:'stopbang',name:'STOP-BANG',desc:'Obstructive sleep apnoea risk screening',cat:'Pulmonary',catColor:'#4A9EFF',catBg:'#4A9EFF22',
ref:'Chung F et al. Anesthesiology 2008;108:812–821.',
fields:[
  {type:'chk',id:'sb_s',label:'Snoring',sub:'Do you snore loudly?',pts:1},
  {type:'chk',id:'sb_t',label:'Tired',sub:'Do you often feel tired, fatigued, or sleepy during daytime?',pts:1},
  {type:'chk',id:'sb_o',label:'Observed apnea',sub:'Has anyone observed you stop breathing during sleep?',pts:1},
  {type:'chk',id:'sb_p',label:'Pressure (BP)',sub:'Do you have or are you treated for high blood pressure?',pts:1},
  {type:'chk',id:'sb_b',label:'BMI > 35 kg/m²',sub:'',pts:1},
  {type:'chk',id:'sb_a',label:'Age > 50 years',sub:'',pts:1},
  {type:'chk',id:'sb_n',label:'Neck circumference > 40 cm',sub:'',pts:1},
  {type:'sel',id:'sb_g',label:'Gender',opts:['Female','Male (+1pt)']},
],
calc(v){
  let s=0;
  ['sb_s','sb_t','sb_o','sb_p','sb_b','sb_a','sb_n'].forEach(k=>{if(v[k])s++;});
  if(v.sb_g==='Male (+1pt)')s+=1;
  return{score:s,max:8};
},
interpret(r){
  const s=r.score;
  if(s<=2)return{risk:'Low Risk OSA',mort:'',color:'#4ADE80',bg:'#4ADE8022',rec:'Low OSA risk. Standard care. Consider formal sleep study only if clinical suspicion remains high.'};
  if(s<=4)return{risk:'Intermediate Risk',mort:'',color:'#F5A623',bg:'#F5A62322',rec:'Intermediate OSA risk. Polysomnography or home sleep test recommended. Pre-op: plan for PACU monitoring, consider post-op CPAP if positive.'};
  return{risk:'High Risk OSA',mort:'',color:'#FF5A5A',bg:'#FF5A5A22',rec:'High OSA risk (score ≥5, or ≥2 from STOP + male/BMI>35/neck>40). Formal sleep study. Pre-operative: consider CPAP. ICU context: prone to hypoxic events during sedation weaning — ensure CPAP available at extubation.'};
}},

// ── STS-ECMO ─────────────────────────────────────
{id:'ecmo',name:'SAVE / STS-ECMO Score',desc:'Survival prediction for VA-ECMO in cardiogenic shock',cat:'Cardiac',catColor:'#FF5A5A',catBg:'#FF5A5A22',
ref:'Schmidt M et al. Eur Heart J 2015;36:2246–2256. Stocker CF et al.',
fields:[
  {type:'num',id:'ec_age',label:'Age (years)',min:0,max:100},
  {type:'num',id:'ec_weight',label:'Weight (kg)',min:20,max:200},
  {type:'chk',id:'ec_mi',label:'Acute MI as primary diagnosis',sub:'',pts:0},
  {type:'chk',id:'ec_myocard',label:'Myocarditis',sub:'',pts:0},
  {type:'chk',id:'ec_cpcr',label:'Post-cardiotomy shock',sub:'',pts:0},
  {type:'chk',id:'ec_renal',label:'Acute renal failure pre-ECMO',sub:'Cr >1.5 mg/dL or oliguria',pts:0},
  {type:'chk',id:'ec_liver',label:'Liver failure pre-ECMO',sub:'Bilirubin >5 mg/dL or coagulopathy',pts:0},
  {type:'chk',id:'ec_cns',label:'CNS dysfunction pre-ECMO',sub:'Stroke, encephalopathy, altered GCS',pts:0},
  {type:'chk',id:'ec_cpap_pre',label:'Pre-ECMO cardiac arrest',sub:'',pts:0},
  {type:'sel',id:'ec_dur',label:'Duration of intubation before ECMO',opts:['Not intubated / <10h','10–29h','≥30h']},
],
calc(v){
  // SAVE score simplified
  let s=6;
  const age=+v.ec_age||0;
  if(age>=63)s-=3;else if(age>=53)s-=2;else if(age>=18)s+=0;
  const wt=+v.ec_weight||0;
  if(wt>83)s-=1;
  if(v.ec_mi)s-=3;if(v.ec_myocard)s+=3;if(v.ec_cpcr)s-=2;
  if(v.ec_renal)s-=3;if(v.ec_liver)s-=2;if(v.ec_cns)s-=3;
  if(v.ec_cpap_pre)s-=2;
  if(v.ec_dur?.includes('10–29'))s-=2;else if(v.ec_dur?.includes('≥30'))s-=4;
  return{score:s,max:15};
},
interpret(r){
  const s=r.score;
  if(s>=1)return{risk:'Class I–II (Good)',mort:'48–75% survival',color:'#4ADE80',bg:'#4ADE8022',rec:'Favourable predicted survival. Proceed with VA-ECMO. Aim for early revascularization if MI-related. Daily weaning trials once hemodynamics improved. Target MAP 65–80, lactate normalisation.'};
  if(s>=-4)return{risk:'Class III (Moderate)',mort:'33–48% survival',color:'#F5A623',bg:'#F5A62322',rec:'Moderate predicted survival. VA-ECMO reasonable. Address all reversible causes. Consider LV unloading (Impella or IABP). ECMO weaning protocol starting 48–72h after stabilisation.'};
  return{risk:'Class IV–V (Poor)',mort:'<33% survival',color:'#FF5A5A',bg:'#FF5A5A22',rec:'Poor predicted outcome. Careful patient selection. Goals-of-care discussion with family essential before initiation. If ECMO proceeding: bridge-to-decision strategy. Bridge to transplant or LVAD evaluation.'};
}},

// ── WELLS DVT ────────────────────────────────────
{id:'wellsdvt',name:'Wells DVT',desc:'Pre-test probability of deep vein thrombosis',cat:'Vascular',catColor:'#4A9EFF',catBg:'#4A9EFF22',
ref:'Wells PS et al. Lancet 1997;350:1795–1798.',
fields:[
  {type:'chk',id:'wd_ca',label:'Active cancer (treatment within 6 months or palliative)',sub:'',pts:1},
  {type:'chk',id:'wd_par',label:'Paralysis, paresis, or recent cast immobilisation of leg',sub:'',pts:1},
  {type:'chk',id:'wd_bed',label:'Bedridden >3 days OR major surgery within 12 weeks',sub:'',pts:1},
  {type:'chk',id:'wd_tend',label:'Tenderness along deep venous system',sub:'',pts:1},
  {type:'chk',id:'wd_leg',label:'Entire leg swollen',sub:'',pts:1},
  {type:'chk',id:'wd_calf',label:'Calf swelling >3 cm compared to other leg',sub:'Measured 10 cm below tibial tuberosity',pts:1},
  {type:'chk',id:'wd_pit',label:'Pitting oedema (greater in symptomatic leg)',sub:'',pts:1},
  {type:'chk',id:'wd_col',label:'Collateral superficial veins (non-varicose)',sub:'',pts:1},
  {type:'chk',id:'wd_prev',label:'Previous DVT documented',sub:'',pts:1},
  {type:'chk',id:'wd_alt',label:'Alternative diagnosis at least as likely as DVT',sub:'SUBTRACT 2 points',pts:-2},
],
calc(v){
  let s=0;
  ['wd_ca','wd_par','wd_bed','wd_tend','wd_leg','wd_calf','wd_pit','wd_col','wd_prev'].forEach(k=>{if(v[k])s++;});
  if(v.wd_alt)s-=2;
  return{score:s,max:9};
},
interpret(r){
  const s=r.score;
  if(s<=0)return{risk:'Low Probability',mort:'DVT ~5%',color:'#4ADE80',bg:'#4ADE8022',rec:'Low probability DVT. D-dimer: if negative → DVT excluded. If positive → compression ultrasound (CUS). If CUS negative → no treatment needed.'};
  if(s<=2)return{risk:'Moderate Probability',mort:'DVT ~17%',color:'#F5A623',bg:'#F5A62322',rec:'Moderate probability. Compression ultrasound (CUS) recommended. If CUS negative and clinical suspicion high: D-dimer and repeat CUS in 1 week.'};
  return{risk:'High Probability',mort:'DVT ~53%',color:'#FF5A5A',bg:'#FF5A5A22',rec:'High probability. Start therapeutic anticoagulation while awaiting imaging. LMWH, fondaparinux, or rivaroxaban. CUS mandatory. If CUS negative and score ≥3: venography or repeat CUS in 72h.'};
}},

// ── WELLS PE ─────────────────────────────────────
{id:'wellspe',name:'Wells PE',desc:'Pre-test probability of pulmonary embolism',cat:'Pulmonary',catColor:'#4A9EFF',catBg:'#4A9EFF22',
ref:'Wells PS et al. Ann Intern Med 2001;135:98–107.',
fields:[
  {type:'chk',id:'wp_dvt',label:'Clinical signs and symptoms of DVT',sub:'Objective leg swelling, pain with palpation',pts:3},
  {type:'chk',id:'wp_alt',label:'PE is #1 diagnosis OR equally likely',sub:'',pts:3},
  {type:'chk',id:'wp_hr',label:'Heart Rate > 100 bpm',sub:'',pts:1.5},
  {type:'chk',id:'wp_imm',label:'Immobilisation (≥3 days) or surgery within 4 weeks',sub:'',pts:1.5},
  {type:'chk',id:'wp_dvthx',label:'Previous DVT or PE',sub:'',pts:1.5},
  {type:'chk',id:'wp_hemo',label:'Haemoptysis',sub:'',pts:1},
  {type:'chk',id:'wp_ca',label:'Malignancy (active or treated within 6 months)',sub:'',pts:1},
],
calc(v){
  let s=0;
  if(v.wp_dvt)s+=3;if(v.wp_alt)s+=3;if(v.wp_hr)s+=1.5;if(v.wp_imm)s+=1.5;
  if(v.wp_dvthx)s+=1.5;if(v.wp_hemo)s+=1;if(v.wp_ca)s+=1;
  return{score:s,max:12.5};
},
interpret(r){
  const s=r.score;
  if(s<=1)return{risk:'Low Probability',mort:'PE ~1–3%',color:'#4ADE80',bg:'#4ADE8022',rec:'Low probability PE. D-dimer: if negative → PE excluded (PERC rule may also be applied). If positive → CTPA. No empirical anticoagulation needed while awaiting D-dimer.'};
  if(s<=4)return{risk:'Moderate Probability',mort:'PE ~12–17%',color:'#F5A623',bg:'#F5A62322',rec:'Moderate probability. CTPA recommended. D-dimer acceptable alternative if CTPA not immediately available and pretest probability is moderate-low. Consider empirical LMWH while awaiting imaging if delay expected.'};
  return{risk:'High Probability',mort:'PE ~40–67%',color:'#FF5A5A',bg:'#FF5A5A22',rec:'High probability PE. CTPA urgently. Start therapeutic anticoagulation immediately (UFH for possible thrombolysis/thrombectomy candidate, LMWH otherwise). If haemodynamically unstable: call PERT team, prepare for thrombolysis or catheter-directed therapy.'};
}},

]; // end SCORES

// ═══════════════════════════════════════════════
// APP STATE
// ═══════════════════════════════════════════════
let currentScore=null;
let scoreValues={};
let favFilter=false;

function getFavs(){try{return JSON.parse(localStorage.getItem('icu_favs')||'[]');}catch{return[];}}
function setFavs(f){localStorage.setItem('icu_favs',JSON.stringify(f));}
function isFav(id){return getFavs().includes(id);}
function toggleFav(id){
  if(!id)return;
  const f=getFavs();
  const i=f.indexOf(id);
  if(i>=0)f.splice(i,1);else f.push(id);
  setFavs(f);
  // Update UI
  const card=document.querySelector(`.score-card[data-id="${id}"]`);
  if(card)card.classList.toggle('fav',f.includes(id));
  const btn=document.getElementById('detail-fav-btn');
  if(btn){btn.classList.toggle('active',f.includes(id));btn.innerHTML=`<i class="ti ${f.includes(id)?'ti-star-filled':'ti-star'}"></i>`;}
}
function toggleFavFilter(){
  favFilter=!favFilter;
  document.getElementById('fav-filter-btn').classList.toggle('active',favFilter);
  renderList();
}

// ═══════════════════════════════════════════════
// LIST VIEW
// ═══════════════════════════════════════════════
function renderList(){
  const q=(document.getElementById('search-input').value||'').toLowerCase();
  const favs=getFavs();
  let scores=SCORES.filter(s=>{
    if(favFilter&&!favs.includes(s.id))return false;
    if(!q)return true;
    return s.name.toLowerCase().includes(q)||s.desc.toLowerCase().includes(q)||s.cat.toLowerCase().includes(q);
  }).sort((a,b)=>a.name.localeCompare(b.name));

  const list=document.getElementById('score-list');
  if(!scores.length){list.innerHTML=`<div class="empty"><i class="ti ti-search-off"></i><p>No scores found for "${q}"</p></div>`;return;}

  // Group by first letter
  const groups={};
  scores.forEach(s=>{const l=s.name[0].toUpperCase();if(!groups[l])groups[l]=[];groups[l].push(s);});

  list.innerHTML=Object.keys(groups).sort().map(letter=>`
    <div class="alpha-group">
      <div class="alpha-label">${letter}</div>
      ${groups[letter].map(s=>`
        <div class="score-card${favs.includes(s.id)?' fav':''}" data-id="${s.id}" style="--cat-color:${s.catColor};--cat-bg:${s.catBg}" onclick="openScore('${s.id}')">
          <div class="sc-left">
            <div class="sc-name">${s.name}</div>
            <div class="sc-desc">${s.desc}</div>
          </div>
          <div class="sc-right">
            <div class="sc-cat" style="background:${s.catBg};color:${s.catColor}">${s.cat}</div>
            <i class="ti ti-star fav-star"></i>
          </div>
        </div>`).join('')}
    </div>`).join('');
}

// ═══════════════════════════════════════════════
// DETAIL VIEW
// ═══════════════════════════════════════════════
function openScore(id){
  const sc=SCORES.find(s=>s.id===id);
  if(!sc)return;
  currentScore=id;
  scoreValues={};
  document.getElementById('detail-title').textContent=sc.name;
  const favBtn=document.getElementById('detail-fav-btn');
  favBtn.classList.toggle('active',isFav(id));
  favBtn.innerHTML=`<i class="ti ${isFav(id)?'ti-star-filled':'ti-star'}"></i>`;
  document.getElementById('home-view').style.display='none';
  const dv=document.getElementById('detail-view');
  dv.style.display='flex';
  renderDetail(sc);
  dv.querySelector('.detail-scroll').scrollTop=0;
}

function goHome(){
  currentScore=null;
  document.getElementById('home-view').style.display='flex';
  document.getElementById('detail-view').style.display='none';
}

function renderDetail(sc){
  const body=document.getElementById('detail-body');
  // Result hero
  const result=sc.calc(scoreValues);
  const interp=sc.interpret(result);
  const pct=Math.min(100,Math.round(result.score/result.max*100));
  const barColor=interp.color;

  let heroTxt=result.score;
  if(sc.id==='rifle')heroTxt=result.stageName||'—';
  if(sc.id==='camicu')heroTxt=result.score===1?'(+)':'(−)';

  body.innerHTML=`
    <div class="result-hero" style="--hero-color:${interp.color}">
      <div class="hero-score">${heroTxt}</div>
      <div class="hero-max">/ ${result.max} points</div>
      <div class="hero-badge" style="background:${interp.bg};color:${interp.color}"><i class="ti ti-pulse"></i> ${interp.risk}</div>
      ${interp.mort?`<div style="font-size:12px;color:var(--ts);margin-bottom:10px">${interp.mort}</div>`:''}
      <div class="bar-wrap"><div class="bar-fill" style="width:${pct}%;background:${barColor}"></div></div>
    </div>

    <div class="section" id="sec-inputs">
      <div class="section-hdr" onclick="toggleSection('sec-inputs')">
        <i class="ti ti-calculator section-icon"></i>
        <span class="section-title">Calculator</span>
        <i class="ti ti-chevron-down"></i>
      </div>
      <div class="section-body">
        ${renderFields(sc)}
        <button class="calc-reset" onclick="resetScore()"><i class="ti ti-refresh"></i> Reset</button>
      </div>
    </div>

    <div class="section" id="sec-rec">
      <div class="section-hdr" onclick="toggleSection('sec-rec')">
        <i class="ti ti-stethoscope section-icon"></i>
        <span class="section-title">Clinical Recommendation</span>
        <i class="ti ti-chevron-down"></i>
      </div>
      <div class="section-body">
        <p class="rec-text">${interp.rec}</p>
        ${interp.extra?`<p class="rec-text" style="margin-top:10px;color:var(--ts)">${interp.extra}</p>`:''}
      </div>
    </div>

    <div class="section" id="sec-notes">
      <div class="section-hdr" onclick="toggleSection('sec-notes')">
        <i class="ti ti-notes section-icon"></i>
        <span class="section-title">Clinical Notes</span>
        <i class="ti ti-chevron-down"></i>
      </div>
      <div class="section-body">
        <div class="notes-area"><textarea placeholder="Add bedside notes, context, or follow-up actions…" id="score-notes" rows="4"></textarea></div>
      </div>
    </div>

    <div class="section collapsed" id="sec-ref">
      <div class="section-hdr" onclick="toggleSection('sec-ref')">
        <i class="ti ti-book section-icon"></i>
        <span class="section-title">Reference</span>
        <i class="ti ti-chevron-down"></i>
      </div>
      <div class="section-body">
        <p class="ref-text">${sc.ref}</p>
        <p style="font-size:11px;color:var(--tt);margin-top:8px">For clinical decision support only — not a substitute for clinical judgement.</p>
      </div>
    </div>
  `;
  attachFieldListeners(sc);
}

function renderFields(sc){
  let html='';
  const numFields=sc.fields.filter(f=>f.type==='num');
  const otherFields=sc.fields.filter(f=>f.type!=='num');

  // Numeric fields in pairs
  for(let i=0;i<numFields.length;i+=2){
    const pair=numFields.slice(i,i+2);
    html+=`<div class="num-group${pair.length===1?' single':''}">`;
    pair.forEach(f=>{
      html+=`<div class="num-field" id="nf-${f.id}">
        <label>${f.label}</label>
        <input type="number" id="fi-${f.id}" placeholder="—" min="${f.min||0}" max="${f.max||999}" step="any" value="${scoreValues[f.id]||''}">
      </div>`;
    });
    html+='</div>';
  }

  // Checkbox and select fields
  otherFields.forEach(f=>{
    if(f.type==='chk'){
      const checked=!!scoreValues[f.id];
      html+=`<button class="item${checked?' checked':''}" id="fi-${f.id}" onclick="toggleItem('${f.id}','${sc.id}')">
        <div class="item-l">
          <span class="item-n">${f.label}</span>
          ${f.sub?`<span class="item-s">${f.sub}</span>`:''}
        </div>
        <div class="item-r">
          ${f.pts!==undefined&&f.pts!==0?`<span class="badge">${f.pts>0?'+':''}${f.pts}</span>`:''}
          <div class="chk"><i class="ti ti-check"></i></div>
        </div>
      </button>`;
    } else if(f.type==='sel'){
      const cur=scoreValues[f.id]||'';
      html+=`<div class="sel-field">
        <label>${f.label}</label>
        <div class="sel-options">
          ${f.opts.map(o=>`<button class="sel-opt${cur===o?' active':''}" onclick="selectOpt('${f.id}','${sc.id}',this,'${o.replace(/'/g,"\\'")}')">
            ${o.split('–').pop().split('(')[0].trim()||o}
          </button>`).join('')}
        </div>
      </div>`;
    }
  });
  return html;
}

function attachFieldListeners(sc){
  sc.fields.filter(f=>f.type==='num').forEach(f=>{
    const inp=document.getElementById(`fi-${f.id}`);
    if(inp){
      inp.addEventListener('input',()=>{
        scoreValues[f.id]=inp.value;
        updateResult(sc);
      });
      inp.addEventListener('focus',()=>document.getElementById(`nf-${f.id}`)?.classList.add('focused'));
      inp.addEventListener('blur',()=>document.getElementById(`nf-${f.id}`)?.classList.remove('focused'));
    }
  });
}

function toggleItem(fid,scid){
  scoreValues[fid]=!scoreValues[fid];
  const btn=document.getElementById(`fi-${fid}`);
  if(btn)btn.classList.toggle('checked',!!scoreValues[fid]);
  const sc=SCORES.find(s=>s.id===scid);
  if(sc)updateResult(sc);
}

function selectOpt(fid,scid,el,val){
  scoreValues[fid]=val;
  el.closest('.sel-options').querySelectorAll('.sel-opt').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  const sc=SCORES.find(s=>s.id===scid);
  if(sc)updateResult(sc);
}

function updateResult(sc){
  const result=sc.calc(scoreValues);
  const interp=sc.interpret(result);
  const pct=Math.min(100,Math.round(result.score/result.max*100));

  let heroTxt=result.score;
  if(sc.id==='rifle')heroTxt=result.stageName||'—';
  if(sc.id==='camicu')heroTxt=result.score===1?'(+)':'(−)';

  const hero=document.querySelector('.hero-score');
  if(hero)hero.textContent=heroTxt;
  const badge=document.querySelector('.hero-badge');
  if(badge){badge.style.background=interp.bg;badge.style.color=interp.color;badge.innerHTML=`<i class="ti ti-pulse"></i> ${interp.risk}`;}
  const mort=document.querySelector('.hero-max');
  // update mort display
  const mortEl=document.querySelector('.result-hero div[style*="color:var(--ts)"]');
  if(mortEl&&interp.mort)mortEl.textContent=interp.mort;
  const bar=document.querySelector('.bar-fill');
  if(bar){bar.style.width=pct+'%';bar.style.background=interp.color;}
  const recEl=document.getElementById('sec-rec')?.querySelector('.rec-text');
  if(recEl)recEl.innerHTML=interp.rec;
  const hero2=document.querySelector('.result-hero');
  if(hero2)hero2.style.setProperty('--hero-color',interp.color);
}

function resetScore(){
  const sc=SCORES.find(s=>s.id===currentScore);
  if(!sc)return;
  scoreValues={};
  renderDetail(sc);
}

function toggleSection(id){
  document.getElementById(id)?.classList.toggle('collapsed');
}

let dProm=null;
const ua=navigator.userAgent;
const isIos=/iphone|ipad|ipod/i.test(ua);
const isSamsung=/SamsungBrowser/i.test(ua);
const isEdge=/Edg/i.test(ua);
const isStandalone=window.matchMedia('(display-mode:standalone)').matches||navigator.standalone;

window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();dProm=e;});

function showInstallModal(){
  const instBtn=document.getElementById('modal-inst-btn');
  const div=document.getElementById('modal-div');
  const steps=document.getElementById('modal-steps');
  if(dProm){instBtn.classList.remove('hidden');div.classList.remove('hidden');}
  else{instBtn.classList.add('hidden');div.classList.add('hidden');}
  let html='';
  if(isIos){
    document.getElementById('modal-title').textContent='Add to Home Screen (iOS)';
    html=`<div class="inst-step"><div class="inst-num">1</div><div class="inst-txt">Tap the <strong>Share</strong> button <span class="inst-icon"><i class="ti ti-share"></i></span> at the bottom</div></div>
    <div class="inst-step"><div class="inst-num">2</div><div class="inst-txt">Tap <strong>"Add to Home Screen"</strong></div></div>
    <div class="inst-step"><div class="inst-num">3</div><div class="inst-txt">Tap <strong>Add</strong></div></div>`;
  }else if(isSamsung){
    document.getElementById('modal-title').textContent='Add to Home Screen (Samsung)';
    html=`<div class="inst-step"><div class="inst-num">1</div><div class="inst-txt">Tap <strong>⋮ menu</strong> at the bottom</div></div>
    <div class="inst-step"><div class="inst-num">2</div><div class="inst-txt">Tap <strong>"Add page to" → "Home screen"</strong></div></div>
    <div class="inst-step"><div class="inst-num">3</div><div class="inst-txt">Tap <strong>Add</strong></div></div>`;
  }else if(isEdge){
    document.getElementById('modal-title').textContent='Add to Home Screen (Edge)';
    html=`<div class="inst-step"><div class="inst-num">1</div><div class="inst-txt">Tap <strong>··· menu</strong> at the bottom</div></div>
    <div class="inst-step"><div class="inst-num">2</div><div class="inst-txt">Tap <strong>"Add to phone"</strong></div></div>
    <div class="inst-step"><div class="inst-num">3</div><div class="inst-txt">Tap <strong>Add</strong></div></div>`;
  }else{
    document.getElementById('modal-title').textContent='Add to Home Screen';
    html=`<div class="inst-step"><div class="inst-num">1</div><div class="inst-txt">Tap the browser <strong>⋮ menu</strong></div></div>
    <div class="inst-step"><div class="inst-num">2</div><div class="inst-txt">Tap <strong>"Add to Home screen"</strong> or <strong>"Install app"</strong></div></div>
    <div class="inst-step"><div class="inst-num">3</div><div class="inst-txt">Tap <strong>Add</strong></div></div>`;
  }
  steps.innerHTML=html;
  document.getElementById('modal-overlay').classList.add('show');
  document.body.style.overflow='hidden';
}
function closeModal(){document.getElementById('modal-overlay').classList.remove('show');document.body.style.overflow='';}
function closeModalOutside(e){if(e.target===document.getElementById('modal-overlay'))closeModal();}
function doInstall(){if(!dProm)return;closeModal();dProm.prompt();dProm.userChoice.then(()=>{dProm=null;});}
window.addEventListener('appinstalled',closeModal);

// ── Service Worker ──
if('serviceWorker'in navigator)window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js').catch(()=>{}));

// ── Init ──
renderList();
</script>
